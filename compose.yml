services:
  odoo:
    image: "odoo:19.0-20251106"
    container_name: odoo
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: "${DB_HOST}"
      PORT: "5432"
      USER: "${DB_USER}"
      PASSWORD: "${DB_PASS}"
      SMTP_SERVER: "${SMTP_HOST}"
      SMTP_PORT: "587"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASSWORD: "${SMTP_PASSWORD}"
    volumes:
      - "odoo:/var/lib/odoo"
      - "./conf/odoo/etc/odoo:/etc/odoo"
    networks:
      - odoo-net
    ports: []
    command: "--database=${DB_NAME} --db_user=${DB_USER} --db_password=${DB_PASS} --db_host=${DB_HOST}"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.odoo.rule=Host(`titan.2gig.technology`)"
      - traefik.http.services.odoo.loadbalancer.server.port=8069
      - traefik.http.routers.odoo.entrypoints=websecure
      - traefik.http.routers.odoo.tls.certresolver=letsencrypt
      - "traefik.http.routers.odoo-longpolling.rule=Host(`titan.2gig.technology`) && PathPrefix(`/longpolling`)"
      - traefik.http.routers.odoo-longpolling.service=odoo-longpolling
      - traefik.http.services.odoo-longpolling.loadbalancer.server.port=8072
      - traefik.http.routers.odoo-longpolling.entrypoints=websecure
      - traefik.http.routers.odoo-longpolling.tls.certresolver=letsencrypt
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    healthcheck:
      test: "[\"CMD\", \"curl\", \"-f\", \"http://localhost:8069/web/health\"]"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4096M

  postgres:
    image: "postgres:16-alpine"
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${DB_NAME}"
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    volumes:
      - "postgres:/var/lib/postgresql/data"
    networks:
      - odoo-net
    healthcheck:
      test: "[\"CMD-SHELL\", \"pg_isready -U $POSTGRES_USER -d $POSTGRES_DB\"]"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  traefik:
    image: "traefik:v3.2"
    container_name: traefik
    restart: unless-stopped
    ports:
      - "\"80:80\""
      - "\"443:443\""
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "traefik:/letsencrypt"
    networks:
      - odoo-net
    command: "--providers.docker=true --providers.docker.exposedbydefault=false --entrypoints.web.address=:80 --entrypoints.websecure.address=:443 --entrypoints.web.http.redirections.entrypoint.to=websecure --certificatesresolvers.letsencrypt.acme.email=suppliers@2gig.technology --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"

  pgadmin:
    image: "dpage/pgadmin4:latest"
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: "paul.stuffins@2gig.technology"
      PGADMIN_DEFAULT_PASSWORD: 9Xsb64kZq5TZ3tLvxPrFHP*858PvjFX*
      PGADMIN_LISTEN_PORT: "5050"
    ports:
      - "\"5050:5050\""
    depends_on:
      postgres:
        condition: service_started
    networks:
      - odoo-net

volumes:
  odoo: null
  postgres: null
  traefik: null

networks:
  odoo-net:
    driver: bridge
